name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd ${{ secrets.WORK_DIR }}

            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Installing dependencies..."
            npm install --production=false

            echo ">>> Building TypeScript..."
            npm run build

            echo ">>> Running database migrations..."
            npx prisma migrate deploy

            echo ">>> Stopping any existing api container..."
            docker compose stop api || true
            docker compose rm -f api || true

            echo ">>> Force-freeing ports..."
            for PORT in 9090 80 443; do
              PID=$(lsof -ti:$PORT 2>/dev/null || true)
              if [ -n "$PID" ]; then kill -9 $PID 2>/dev/null || true; fi
            done
            sleep 2

            echo ">>> Pruning corrupted Docker build cache..."
            docker builder prune -f

            echo ">>> Restarting containers..."
            docker compose up -d --build

            echo ">>> Done! Deployment complete."
          ENDSSH

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh
